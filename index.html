<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dad</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
:root {
  --cover1: #7ec8f0;
  --cover2: #5ab5e8;
  --cover3: #3da0d8;
  --page-bg: #f0f9ff;
  --text-dk: #1a5f8a;
  --accent: #ffda6e;
  --shadow: rgba(58,130,180,0.22);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background: radial-gradient(ellipse at 40% 30%, #c2e8ff 0%, #8fc7ec 100%);
  display:flex; 
  align-items:center; 
  justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
}

.confetti-bg { 
  position:fixed; inset:0; pointer-events:none; overflow:hidden; 
}

.scene {
  perspective:2200px;
  width:460px; 
  height:620px;
  position:relative;
}

.card-wrapper {
  width:100%; height:100%;
  position:relative;
  transform-style:preserve-3d;
}

/* Pages */
.pages-bg {
  position:absolute; inset:0;
  background:var(--page-bg);
  border-radius:12px 24px 24px 12px;
  box-shadow:6px 10px 35px var(--shadow);
  overflow:hidden;
}

.page {
  position:absolute; inset:0;
  padding:30px 28px 55px;
  background:linear-gradient(150deg, #f0f9ff, #e4f4fd);
  display:flex; 
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  border-radius:inherit;
}

.page.active {
  opacity:1;
  pointer-events:all;
}

/* Main Content */
.main-content {
  text-align:center;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  gap:12px;
}

.msg-emoji { font-size:36px; }

.msg-heading {
  font-family:'Pacifico',cursive;
  font-size:33px; 
  color:var(--text-dk);
  line-height:1.1;
}

.msg-body {
  font-size:16px; 
  line-height:1.75;
  color:#2a7ab3;
  max-width:320px;
  margin-top:8px;
}

/* Small Centered Photo */
.photo-frame {
  width:100%;
  max-width:210px;
  margin:10px 0 18px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.photo-frame img {
  width:100%;
  height:auto;
  display:block;
}

/* Danger Button */
.nav-btn {
  position:absolute;
  bottom:26px;
  right:26px;
  font-weight:800;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#c0392b;
  cursor:pointer;
  animation:wobble 2.8s ease-in-out infinite;
  user-select:none;
}

@keyframes wobble {
  0%,100%{transform:rotate(0deg)}
  25%{transform:rotate(-3deg)}
  75%{transform:rotate(3deg)}
}

/* ── ORIGINAL COVER STYLE ── */
.cover {
  position:absolute; inset:0;
  background:linear-gradient(145deg,var(--cover1) 0%,var(--cover2) 55%,var(--cover3) 100%);
  border-radius:12px 24px 24px 12px;
  box-shadow:8px 12px 40px rgba(40,120,180,.4);
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  z-index:10;
  transition:transform 1.1s cubic-bezier(0.77,0,0.175,1);
  transform-origin:left center;
}

.cover.flipped {
  transform:rotateY(-172deg);
  pointer-events:none;
}

.cover::before {
  content:''; position:absolute; inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.18) 2px,transparent 2px);
  background-size:28px 28px;
}

.cover::after {
  content:''; position:absolute; inset:0;
  border-radius:inherit; 
  border:3px solid rgba(255,255,255,0.25); 
  pointer-events:none;
}

.cover-inner { 
  position:relative; 
  z-index:2; 
  text-align:center; 
  padding:32px; 
}

.cover-tag {
  font-size:12px; 
  font-weight:800; 
  letter-spacing:.25em; 
  text-transform:uppercase;
  color:rgba(255,255,255,.75); 
  margin-bottom:20px;
}

.cover-hb {
  font-family:'Pacifico',cursive; 
  font-size:54px; 
  line-height:1.05;
  color:white; 
  text-shadow:0 3px 0 rgba(0,0,0,0.08),0 0 40px rgba(255,255,255,0.3);
  margin-bottom:4px;
}

.cover-dad {
  font-family:'Pacifico',cursive; 
  font-size:78px; 
  line-height:1;
  color:var(--accent); 
  display:block;
  text-shadow:0 4px 0 rgba(0,0,0,0.1),0 0 50px rgba(255,218,110,0.5);
}

.cover-rule {
  width:100px; 
  height:3px; 
  border-radius:2px;
  background:rgba(255,255,255,0.45); 
  margin:22px auto 20px;
}

.cover-sub { 
  font-size:15px; 
  font-weight:700; 
  color:rgba(255,255,255,.7); 
  letter-spacing:.05em; 
}

.cover-balloon {
  position:absolute; 
  font-size:36px; 
  pointer-events:none;
  animation:bob 3s ease-in-out infinite alternate;
}

.cover-balloon.bl{left:18px;top:20px}
.cover-balloon.br{right:18px;top:20px;animation-delay:.8s}
.cover-balloon.ll{left:18px;bottom:40px;animation-delay:.4s}
.cover-balloon.lr{right:18px;bottom:40px;animation-delay:1.2s}

@keyframes bob { 
  from{transform:translateY(0)} 
  to{transform:translateY(-12px)} 
}

.click-hint {
  position:absolute; 
  bottom:22px; 
  width:100%; 
  text-align:center;
  font-size:11px; 
  font-weight:700; 
  letter-spacing:.18em; 
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
  animation:pulse-hint 2.5s ease-in-out infinite;
}

@keyframes pulse-hint{0%,100%{opacity:.3}50%{opacity:.8}}

/* Video & Shred */
#videoReveal, #shredOverlay {
  position:fixed; inset:0; z-index:999;
}

#videoReveal {
  background:#000;
  display:none; 
  align-items:center; 
  justify-content:center;
}

#videoReveal video {
  width:100vw; height:100vh; object-fit:cover;
}

#shredOverlay {
  pointer-events:none; 
  display:none;
}

.shred-strip {
  position:absolute; top:0; bottom:0;
  background:#f0f9ff;
  transform-origin:top center;
  animation:shred-fall var(--dur) cubic-bezier(0.4,0,0.9,0.6) forwards;
  animation-delay:var(--delay);
}

@keyframes shred-fall {
  0%   {transform:translateY(0) rotate(0deg) skewX(0deg); opacity:1}
  100% {transform:translateY(130vh) rotate(var(--tilt)) skewX(var(--skew)); opacity:0}
}
</style>
</head>
<body>

<div class="confetti-bg" id="confettiBg"></div>

<div id="videoReveal">
  <video id="surpriseVideo" playsinline autoplay loop>
    <source src="surprise.mp4" type="video/mp4">
  </video>
</div>

<div id="shredOverlay"></div>

<div class="scene">
  <div class="card-wrapper">

    <div class="pages-bg">
      <div class="page active" id="mainPage">
        <div class="main-content">
          <div class="msg-emoji">🎂</div>
          <div class="msg-heading">Happy Birthday, Dad! 🎉</div>
          
          <div class="photo-frame">
            <img src="photo.jpg" 
                 alt="Happy moments with Dad"
                 onerror="this.src='https://via.placeholder.com/360x240?text=Photo+Not+Found';">
          </div>

          <p class="msg-body">
             Babbo grazie per tutto quello che fai per noi.
            Ti vogliamo tantissimo bene!<br><br>
            Speriamo che tu abbia un compleanno fantatsico! :)
          </p>
        </div>

        <div class="nav-btn" id="nav-shred">
          ⚠ DO NOT CLICK !!!
        </div>
      </div>
    </div>

    <!-- Original Cover -->
    <div class="cover" id="cover">
      <span class="cover-balloon bl">🎈</span>
      <span class="cover-balloon br">🎈</span>
      <span class="cover-balloon ll">🎀</span>
      <span class="cover-balloon lr">✨</span>
      
      <div class="cover-inner">
        <div class="cover-tag">A special card for</div>
        <div class="cover-hb">Happy Birthday<span class="cover-dad">Dad!</span></div>
        <div class="cover-rule"></div>
        <div class="cover-sub">Tap to open 🎁</div>
      </div>
      <div class="click-hint">click me!</div>
    </div>

  </div>
</div>

<script>
// Floating confetti
(function(){
  const bg = document.getElementById('confettiBg');
  const colors = ['#7ec8f0','#ffda6e','#ff8fab','#7ddfc3'];
  for(let i=0; i<25; i++){
    const d = document.createElement('div');
    d.className = 'cdot';
    const size = 8 + Math.random()*20;
    d.style.cssText = `
      position:absolute; border-radius:50%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      opacity:0.35;
      animation: float-dot ${3+Math.random()*6}s ease-in-out infinite alternate;
      animation-delay:${Math.random()*4}s;
    `;
    bg.appendChild(d);
  }
})();

// Open cover
document.getElementById('cover').addEventListener('click', function(){
  this.classList.add('flipped');
});

// Trigger shred + video
document.getElementById('nav-shred').addEventListener('click', triggerShred);

function triggerShred(){
  const vid = document.getElementById('surpriseVideo');
  const reveal = document.getElementById('videoReveal');
  const overlay = document.getElementById('shredOverlay');

  reveal.style.display = 'flex';
  vid.volume = 1;
  vid.muted = false;
  vid.play().catch(() => {});

  overlay.innerHTML = '';
  overlay.style.display = 'block';
  
  const COUNT = 22;
  const sw = window.innerWidth / COUNT;
  const DUR = 1.7;

  for(let i = 0; i < COUNT; i++){
    const s = document.createElement('div');
    s.className = 'shred-strip';
    const tilt = (Math.random() - 0.5) * 40;
    const skew = (Math.random() - 0.5) * 16;
    const delay = i * 0.035 + Math.random() * 0.05;
    
    s.style.cssText = `
      left:${i*sw}px; 
      width:${sw + 2}px;
      --tilt:${tilt}deg;
      --skew:${skew}deg;
      --dur:${DUR}s;
      --delay:${delay}s;
    `;
    overlay.appendChild(s);
  }

  setTimeout(() => {
    overlay.style.display = 'none';
  }, (DUR + 1.2) * 1000);
}
</script>

<style>
.cdot {
  animation: float-dot 4s ease-in-out infinite alternate;
}
@keyframes float-dot {
  from { transform: translateY(0) rotate(0deg); }
  to   { transform: translateY(-35px) rotate(180deg); }
}
</style>

</body>
</html>
